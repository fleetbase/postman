$kind: http-request
description: |-
  Creates an order from a purchased service quote. Use this after selecting the integrated vendor quote returned by the service quote step.
url: "{{base_url}}/{{namespace}}/orders"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: service_quote
      value: "{{service_quote_id}}"
order: 6000
