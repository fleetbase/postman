$kind: http-example
request:
  url: "{{base_url}}/{{api_prefix}}/{{namespace}}/checkouts/stripe-update-payment-intent"
  method: PUT
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "customer": "{{customer_id}}",
        "cart": "{{cart_id}}",
        "service_quote": "{{service_quote_id}}",
        "payment_intent_id": "{{payment_intent_id}}",
        "pickup": false,
        "tip": 0,
        "delivery_tip": 0
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "checkout_abc123",
        "object": "checkout",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
