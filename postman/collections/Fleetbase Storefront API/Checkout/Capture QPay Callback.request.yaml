$kind: http-request
description: |-
  Processes a QPay checkout callback and publishes the payment result for the checkout session. The response returns payment status details when a response is requested.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/checkouts/capture-qpay"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "checkout": "{{checkout_id}}",
      "respond": true,
      "test": "success"
    }
order: 4000
