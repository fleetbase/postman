$kind: http-request
description: |-
  Processes a QPay checkout callback. Fleetbase verifies the checkout and gateway, checks the QPay invoice payment state, and creates the order when payment is confirmed.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/checkouts/capture-qpay"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "checkout": "{{checkout_id}}",
      "respond": true,
      "test": "success"
    }
order: 4000
