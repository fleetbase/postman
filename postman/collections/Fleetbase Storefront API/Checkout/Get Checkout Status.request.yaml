$kind: http-request
description: |-
  Returns the status of a checkout by checkout ID or token.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/checkouts/status"
method: GET
headers:
  - key: Authorization
    value: ""
    description: Authentication header
queryParams:
  checkout: "{{checkout_id}}"
  token: "{{checkout_token}}"
order: 5000
