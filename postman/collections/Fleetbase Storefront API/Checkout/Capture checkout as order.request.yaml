$kind: http-request
description: |-
  Capture checkout as order for checkout. The response returns the result of the operation.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/checkouts/capture"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "token": "{{checkout_token}}"
    }
order: 3000
