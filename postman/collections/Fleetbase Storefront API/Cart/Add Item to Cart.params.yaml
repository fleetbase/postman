$kind: params
fields:
  - name: quantity
    type: integer
    description: "Quantity of the product to add. Defaults to 1."
  - name: variants
    type: array of objects
    description: "Selected product variant data to store on the cart line item."
  - name: addons
    type: array of objects
    description: "Selected product addon data to store on the cart line item."
  - name: scheduled_at
    type: timestamp
    description: "Scheduled fulfillment time for the line item."
  - name: store_location
    type: string
    description: "Public ID of the store location to associate with the line item."
