$kind: http-request
description: |-
  Add Item to Cart for cart. The response returns the result of the operation.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/carts/{id}/{product_id}"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
pathVariables:
  id: ""
  product_id: ""
body:
  type: json
  content: |-
    {
      "addons": [],
      "quantity": 1,
      "scheduled_at": "scheduled_at_value_here",
      "store_location": "store_location_value_here",
      "variants": []
    }
order: 1000
