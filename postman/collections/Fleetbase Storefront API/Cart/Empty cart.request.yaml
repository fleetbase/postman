$kind: http-request
description: |-
  Removes every line item from the cart. The response returns the cart after its items have been cleared.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/carts/{id}/empty"
method: PUT
headers:
  - key: Authorization
    value: ""
    description: Authentication header
pathVariables:
  id: ""
order: 5000
