$kind: object
name: Cart
description: |-
  A cart stores storefront products selected for checkout, including quantities, variants, addons, scheduling, and pricing totals.
example: |
  {
    "id": "cart_8Xk2mQ1",
    "customer_id": "customer_4sW9kP2",
    "currency": "USD",
    "subtotal": 4200,
    "total_items": 3,
    "total_unique_items": 2,
    "items": [],
    "events": [],
    "discount_code": null,
    "expires_at": "2026-05-08T09:30:00Z",
    "created_at": "2026-05-07T09:30:00Z",
    "updated_at": "2026-05-07T09:30:00Z"
  }
fields:
  - name: id
    type: string
    description: "Public identifier of the cart."
  - name: customer_id
    type: string
    description: "Customer identifier associated with the cart."
  - name: currency
    type: currency
    description: "Cart currency code."
  - name: subtotal
    type: integer
    description: "Cart subtotal."
  - name: total_items
    type: integer
    description: "Total quantity of items in the cart."
  - name: total_unique_items
    type: integer
    description: "Number of unique cart line items."
  - name: items
    type: array of objects
    description: "Cart line items."
  - name: events
    type: array of objects
    description: "Cart event history."
  - name: discount_code
    type: string
    description: "Discount code applied to the cart."
  - name: expires_at
    type: timestamp
    description: "Time the cart expires."
  - name: created_at
    type: timestamp
    description: "Time the cart was created."
  - name: updated_at
    type: timestamp
    description: "Time the cart was last updated."
