$kind: object
name: Storefront Order
description: |-
  A storefront order is a FleetOps order created from a captured storefront checkout.
example: |
  {
    "id": "order_9Kx2mQ1",
    "public_id": "order_9Kx2mQ1",
    "status": "created",
    "type": "storefront",
    "payload": null,
    "customer": null,
    "meta": {
      "checkout_id": "checkout_123",
      "storefront": "Acme Market",
      "total": 5150,
      "currency": "USD"
    },
    "notes": null,
    "created_at": "2026-05-07T09:30:00Z",
    "updated_at": "2026-05-07T09:30:00Z"
  }
fields:
  - name: id
    type: string
    description: "Public identifier of the order."
  - name: public_id
    type: string
    description: "Public identifier of the order."
  - name: status
    type: string
    description: "Order lifecycle status."
  - name: type
    type: string
    description: "Order type, usually `storefront` for orders created by this API."
  - name: payload
    type: object
    description: "FleetOps payload created from the storefront cart."
  - name: customer
    type: object
    description: "Customer associated with the order."
  - name: meta
    type: object
    description: "Storefront checkout, payment, totals, and fulfillment metadata."
  - name: notes
    type: string
    description: "Order notes supplied during checkout capture."
  - name: created_at
    type: timestamp
    description: "Time the order was created."
  - name: updated_at
    type: timestamp
    description: "Time the order was last updated."
