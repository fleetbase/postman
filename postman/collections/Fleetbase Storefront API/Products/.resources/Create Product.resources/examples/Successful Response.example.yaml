$kind: http-example
request:
  url: "{{base_url}}/{{api_prefix}}/{{namespace}}/products"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "Example Product",
        "description": "Example storefront product",
        "price": 1000
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "product_abc123",
        "object": "product",
        "name": "Example Product",
        "price": 1000,
        "currency": "USD",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
