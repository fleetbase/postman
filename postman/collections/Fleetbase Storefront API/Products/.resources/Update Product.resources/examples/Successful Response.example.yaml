$kind: http-example
request:
  url: "{{base_url}}/{{api_prefix}}/{{namespace}}/products/{{product_id}}"
  method: PUT
  headers:
    Accept: application/json
  pathVariables:
    product_id: ""
  body:
    type: json
    content: |-
      {
        "name": "Updated Product",
        "description": "Updated storefront product",
        "price": 1000
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "product_abc123",
        "object": "product",
        "name": "Example Product",
        "price": 1000,
        "currency": "USD",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
