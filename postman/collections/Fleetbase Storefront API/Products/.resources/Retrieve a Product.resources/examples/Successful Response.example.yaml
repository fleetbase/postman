$kind: http-example
request:
  url: "{{base_url}}/{{api_prefix}}/{{namespace}}/products/{id}"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    id: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "product_abc123",
        "object": "product",
        "name": "Example Product",
        "price": 1000,
        "currency": "USD",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
