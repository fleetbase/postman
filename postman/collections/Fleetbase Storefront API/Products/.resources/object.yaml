$kind: object
name: Product
description: |-
  A product represents a product record managed through the Fleetbase API. It includes a stable identifier, lifecycle state, timestamps, and the resource-specific attributes returned by the API.
example: |-
  {
    "id": "product_abc123",
    "object": "product",
    "name": "Example Product",
    "price": 1000,
    "currency": "USD",
    "status": "active",
    "created_at": "2026-05-07T12:00:00Z"
  }
fields:
  - name: id
    type: string
    description: "Unique identifier for the resource."
  - name: object
    type: string
    description: "Object type returned by the API."
  - name: name
    type: string
    description: "Display name for the resource."
  - name: price
    type: number
    description: "Price for the item."
  - name: currency
    type: currency
    description: "Three-letter currency code."
  - name: status
    type: enum
    values: ["active", "inactive"]
    description: "Lifecycle status of the resource."
  - name: created_at
    type: timestamp
    description: "Time when the resource was created."
