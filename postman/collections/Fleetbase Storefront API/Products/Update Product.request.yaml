$kind: http-request
description: |-
  Updates a product. Parameters not supplied remain unchanged.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/products/{{product_id}}"
method: PUT
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Product",
      "description": "Updated storefront product",
      "price": 1000
    }
order: 4000
