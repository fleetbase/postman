$kind: http-request
description: |-
  Sends a verification code to a new phone number for the authenticated storefront customer. Fleetbase rejects numbers already assigned to another user.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/customers/request-phone-verification"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phone": "{{customer_phone}}"
    }
order: 8200
