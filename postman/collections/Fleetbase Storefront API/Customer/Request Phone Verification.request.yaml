$kind: http-request
description: |-
  Sends a phone verification code to the authenticated storefront customer. Use the code with the verify phone number endpoint.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/customers/request-phone-verification"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phone": "{{customer_phone}}"
    }
order: 8200
