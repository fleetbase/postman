$kind: http-request
description: |-
  Authenticates a storefront customer with Facebook account details. The response returns the customer profile and an access token when authentication succeeds.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/customers/login-with-facebook"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{customer_email}}",
      "name": "{{customer_name}}",
      "facebookUserId": "{{facebook_user_id}}"
    }
order: 5300
