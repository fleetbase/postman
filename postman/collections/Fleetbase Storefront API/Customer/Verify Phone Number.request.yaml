$kind: http-request
description: |-
  Verifies a customer phone number with a previously issued code. The response confirms the phone verification result.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/customers/verify-phone-number"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phone": "{{customer_phone}}",
      "code": "{{verification_code}}"
    }
order: 8300
