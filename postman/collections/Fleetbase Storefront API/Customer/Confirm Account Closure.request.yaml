$kind: http-request
description: |-
  Confirms storefront account closure using the verification code sent to the customer. Fleetbase deletes the customer contact and, for customer users, the linked user account.
url: "{{base_url}}/{{api_prefix}}/{{namespace}}/customers/confirm-account-closure"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "code": "{{verification_code}}"
    }
order: 8100
