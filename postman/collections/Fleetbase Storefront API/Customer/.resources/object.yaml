$kind: object
name: Customer
description: |-
  A customer represents a customer record managed through the Fleetbase API. It includes a stable identifier, lifecycle state, timestamps, and the resource-specific attributes returned by the API.
example: |-
  {
    "id": "customer_abc123",
    "object": "customer",
    "name": "Jane Customer",
    "email": "jane@example.com",
    "phone": "+15555550102",
    "created_at": "2026-05-07T12:00:00Z"
  }
fields:
  - name: id
    type: string
    description: "Unique identifier for the resource."
  - name: object
    type: string
    description: "Object type returned by the API."
  - name: name
    type: string
    description: "Display name for the resource."
  - name: email
    type: string
    description: "Email address for the person or customer."
  - name: phone
    type: string
    description: "Phone number for the person or customer."
  - name: created_at
    type: timestamp
    description: "Time when the resource was created."
