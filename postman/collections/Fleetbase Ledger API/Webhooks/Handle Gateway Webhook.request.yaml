$kind: http-request
description: |-
  Receives a payment gateway webhook and records the normalized ledger event. The response acknowledges the webhook so the gateway can stop retrying.
url: "{{base_url}}/{{api_prefix}}/webhooks/{{gateway_driver}}"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "company_uuid": "{{company_id}}",
      "id": "{{gateway_event_id}}",
      "type": "payment_intent.succeeded",
      "data": {
        "object": {}
      }
    }
order: 1000
