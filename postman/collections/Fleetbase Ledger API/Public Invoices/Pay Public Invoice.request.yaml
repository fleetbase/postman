$kind: http-request
description: |-
  Initiates or records payment for a public invoice. Stripe gateways return a checkout URL, while non-redirect gateways record the invoice payment immediately.
url: "{{base_url}}/{{api_prefix}}/public/invoices/{{invoice_public_id}}/pay"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "gateway_id": "{{gateway_id}}",
      "reference": "{{payment_reference}}"
    }
order: 3000
