$kind: http-request
description: |-
  Pays a public invoice with the selected payment gateway. The response returns either a hosted checkout URL or the updated invoice payment state.
url: "{{base_url}}/{{api_prefix}}/public/invoices/{{invoice_public_id}}/pay"
method: POST
headers:
  - key: Authorization
    value: ""
    description: Authentication header
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "gateway_id": "{{gateway_id}}",
      "reference": "{{payment_reference}}"
    }
order: 3000
