$kind: http-example
request:
  url: "{{base_url}}/{{api_prefix}}/public/invoices/{{invoice_public_id}}/pay"
  method: POST
  headers:
    Accept: application/json
  pathVariables:
    invoice_public_id: ""
  body:
    type: json
    content: |-
      {
        "gateway_id": "{{gateway_id}}",
        "reference": "{{payment_reference}}"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "invoice_abc123",
        "object": "invoice",
        "number": "INV-1001",
        "status": "sent",
        "currency": "USD",
        "balance": 2500,
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
