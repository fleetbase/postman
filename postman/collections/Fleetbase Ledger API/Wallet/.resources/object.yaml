$kind: object
name: Wallet
description: |-
  A wallet represents a wallet record managed through the Fleetbase API. It includes a stable identifier, lifecycle state, timestamps, and the resource-specific attributes returned by the API.
example: |-
  {
    "id": "wallet_abc123",
    "object": "wallet",
    "balance": 1000,
    "currency": "USD",
    "status": "active",
    "created_at": "2026-05-07T12:00:00Z"
  }
fields:
  - name: id
    type: string
    description: "Unique identifier for the resource."
  - name: object
    type: string
    description: "Object type returned by the API."
  - name: balance
    type: string
    description: "Balance value for this wallet request."
  - name: currency
    type: currency
    description: "Three-letter currency code."
  - name: status
    type: enum
    values: ["active", "inactive"]
    description: "Lifecycle status of the resource."
  - name: created_at
    type: timestamp
    description: "Time when the resource was created."
