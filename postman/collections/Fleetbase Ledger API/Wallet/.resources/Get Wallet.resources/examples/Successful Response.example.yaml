  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "wallet_abc123",
        "object": "wallet",
        "balance": 1000,
        "currency": "USD",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
