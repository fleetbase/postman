$kind: http-example
request:
  url: "{{base_url}}/{{api_prefix}}/{{namespace}}/wallet/topup"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "gateway": "{{gateway_id}}",
        "amount": 1000,
        "payment_method_token": "{{payment_method_token}}",
        "customer_id": "{{gateway_customer_id}}",
        "description": "Wallet top-up"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "wallet_abc123",
        "object": "wallet",
        "balance": 1000,
        "currency": "USD",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
