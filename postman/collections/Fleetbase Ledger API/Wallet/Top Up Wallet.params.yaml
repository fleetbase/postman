$kind: params
fields:
  - name: gateway
    type: string
    required: true
    description: "Payment gateway ID or code."
  - name: amount
    type: number
    required: true
    description: "Monetary amount for the request."
  - name: payment_method_token
    type: string
    description: "Payment method token returned by the gateway."
  - name: customer_id
    type: string
    description: "Customer id value for this wallet request."
  - name: description
    type: string
    description: "Human-readable description of the resource."
