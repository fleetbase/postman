$kind: http-request
description: |-
  Retrieves a purchase rate. The response includes the current API representation of the resource.
url: "{{base_url}}/{{namespace}}/purchase-rates/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{purchase_rate_id}}"
    description: (Required) The id of the `PurchaseRate`.
examples: ./.resources/Retrieve a Purchase Rate.resources/examples
order: 2000
