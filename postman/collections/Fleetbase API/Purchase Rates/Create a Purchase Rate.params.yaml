$kind: params
fields:
  - name: service_quote
    type: string
    required: true
    description: Service quote ID to purchase.
  - name: order
    type: string
    description: Existing order ID to attach the purchase rate to. When omitted, Fleetbase may create an order from the service quote.
  - name: customer
    type: string
    description: Contact or vendor ID to assign as the purchase customer.
  - name: meta
    type: object
    description: Additional purchase rate metadata.
