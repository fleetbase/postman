$kind: http-request
description: This endpoint allows you to query purchase-rates you have created, it also provides paginated results on all the purchase-rates in your Fleetbase.
url: "{{base_url}}/{{namespace}}/purchase-rates?limit=25&offset=0&sort=created_at"
method: GET
queryParams:
  - key: customer
    value: <string>
    disabled: true
    description: The id of the customer the rate was purchased for.
  - key: limit
    value: "25"
    description: A cursor for use in pagination. A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 10.
  - key: offset
    value: "0"
    description: A cursor for use in pagination. A offset for the results, when the offset is supplied the results will start from the offset.
  - key: sort
    value: created_at
    description: You can order the results by any property of the Purchase Rate object.
order: 3000
