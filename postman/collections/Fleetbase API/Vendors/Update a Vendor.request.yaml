$kind: http-request
description: |-
  Updates a vendor's profile, primary address, type, contact fields, or metadata.
url: "{{base_url}}/{{namespace}}/vendors/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{vendor_id}}"
    description: (Required) The id of the vendor to update.
body:
  type: json
  content: |-
    {
        "name": "ABC Corporation",
        "type": "Supplier",
        "email": "abc@example.com",
        "phone": "1234567890"
    }
examples: ./.resources/Update a Vendor.resources/examples
order: 3000
