$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/vendors?name=<string>&type=<string>&internal_id=<string>&email=<string>&phone_number=<string>&phone_country_code=<string>&address=<string>"
  method: POST
  headers:
    Accept: application/json
  queryParams:
    - key: name
      value: <string>
      description: (Required) The name of the vendor.
    - key: type
      value: <string>
      description: The classification of the vendor.
    - key: internal_id
      value: <string>
      description: The unique identifier used internally.
    - key: email
      value: <string>
      description: The email of the vendor.
    - key: phone_number
      value: <string>
      description: The phone number of the vendor.
    - key: phone_country_code
      value: <string>
      description: The international calling code of the phone number of the vendor.
    - key: address
      value: <string>
      description: The Place object identifier to assign to the vendor as the vendors address.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "<string>",
        "internal_id": "<string>",
        "name": "<string>",
        "email": "<string>",
        "phone_number": "<string>",
        "phone_country_code": "<string>",
        "address": "<string>",
        "type": "<string>",
        "slug": "<string>",
        "updated_at": "<string>",
        "created_at": "<string>"
      }
order: 1000
