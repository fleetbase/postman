$kind: http-request
description: This endpoint allows you to retrieve a vendor object to view it's details.
url: "{{base_url}}/{{namespace}}/vendors/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{vendor_id}}"
    description: (Required) The id of the vendor you want to delete.
examples: ./.resources/Retrieve a Vendor.resources/examples
order: 2000
