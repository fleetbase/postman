$kind: params
fields:
  - name: name
    type: string
    required: true
    description: Vendor display name.
  - name: type
    type: string
    required: true
    description: Vendor type.
  - name: email
    type: string
    description: Vendor email address.
  - name: phone
    type: string
    description: Vendor phone number.
  - name: address
    type: string
    description: Place ID to use as the vendor's primary address.
  - name: meta
    type: object
    description: Additional vendor metadata.
