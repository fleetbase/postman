$kind: object
name: Entity
description: |-
  An entity represents an item, parcel, package, or other physical unit attached to a payload. It can include dimensions, weight, pricing, destination, customer, tracking, and metadata.
example: |
  {
    "id": "entity_4Mnp8Qx2Vz",
    "internal_id": "ENTITY001",
    "name": "Sample Entity",
    "type": "parcel",
    "payload": "payload_x9Z2Lm8QpA",
    "destination": "place_9Z8y7X6w5V",
    "customer": null,
    "tracking_number": {
      "id": "tracking_3Nf8Qw2YxM",
      "tracking_number": "FB-ENTITY-1001"
    },
    "description": "Sample description",
    "photo_url": null,
    "length": 10,
    "width": 5,
    "height": 8,
    "dimensions_unit": "mm",
    "weight": 2.5,
    "weight_unit": "kg",
    "declared_value": 1500,
    "price": 1200,
    "sale_price": 900,
    "sku": "SKU123",
    "currency": "USD",
    "meta": {},
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public entity identifier.
  - name: internal_id
    type: string
    description: Optional internal identifier for the entity.
  - name: name
    type: string
    description: Display name for the entity.
  - name: type
    type: string
    description: Entity type.
  - name: payload
    type: string
    description: Public ID of the payload attached to the entity.
  - name: destination
    type: string
    description: Public ID of the destination place.
  - name: customer
    type: object
    description: Customer contact or vendor associated with the entity.
  - name: supplier
    type: object
    description: Supplier associated with the entity, when loaded.
  - name: tracking_number
    type: object
    description: Tracking number resource generated for the entity.
  - name: description
    type: string
    description: Human-readable entity description.
  - name: photo_url
    type: string
    description: Photo URL associated with the entity.
  - name: length
    type: number
    description: Entity length.
  - name: width
    type: number
    description: Entity width.
  - name: height
    type: number
    description: Entity height.
  - name: dimensions_unit
    type: string
    description: Unit for length, width, and height.
  - name: weight
    type: number
    description: Entity weight.
  - name: weight_unit
    type: string
    description: Unit for weight.
  - name: declared_value
    type: currency
    description: Declared value of the entity.
  - name: price
    type: currency
    description: Price of the entity.
  - name: sale_price
    type: currency
    description: Sale price of the entity.
  - name: sku
    type: string
    description: Stock keeping unit for the entity.
  - name: currency
    type: currency
    description: Three-letter currency code for monetary fields.
  - name: meta
    type: object
    description: Additional entity metadata.
  - name: updated_at
    type: timestamp
    description: Timestamp when the entity was last updated.
  - name: created_at
    type: timestamp
    description: Timestamp when the entity was created.
