$kind: http-request
description: |-
  Deletes an entities resource. The response confirms the resource that was removed.
url: "{{base_url}}/{{namespace}}/entities/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{entity_id}}"
    description: (Required) The id of the `Entity`.
examples: ./.resources/Delete a Entity.resources/examples
order: 5000
