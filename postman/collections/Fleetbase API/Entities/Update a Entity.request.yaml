$kind: http-request
description: |-
  Updates an entity's descriptive fields, payload assignment, destination, dimensions, weight, pricing, or metadata.
url: "{{base_url}}/{{namespace}}/entities/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{entity_id}}"
    description: (Required) The id of the `Entity`.
body:
  type: json
  content: |-
    {
        "internal_id": "ENTITY001-1",
        "description": "New entity description",
        "destination": "",
        "sku": "SKUABC123",
        "currency": "SGD"
    }
examples: ./.resources/Update a Entity.resources/examples
order: 4000
