$kind: params
fields:
  - name: limit
    type: integer
    description: Maximum number of entities to return.
  - name: offset
    type: integer
    description: Number of entities to skip before returning results.
  - name: sort
    type: string
    description: Sort expression for the entity query.
  - name: type
    type: string
    description: Filters entities by entity type.
  - name: payload
    type: string
    description: Filters entities by payload ID.
  - name: destination
    type: string
    description: Filters entities by destination place ID.
