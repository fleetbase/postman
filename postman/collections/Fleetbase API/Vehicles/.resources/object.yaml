$kind: object
name: Vehicle
description: |-
  A vehicle represents a vehicle record managed through the Fleetbase API. It includes a stable identifier, lifecycle state, timestamps, and the resource-specific attributes returned by the API.
example: |-
  {
    "id": "vehicle_abc123",
    "object": "vehicle",
    "make": "Toyota",
    "model": "Camry",
    "plate_number": "ABC123",
    "status": "active",
    "created_at": "2026-05-07T12:00:00Z"
  }
fields:
  - name: id
    type: string
    description: "Unique identifier for the resource."
  - name: object
    type: string
    description: "Object type returned by the API."
  - name: make
    type: string
    description: "Make value for this vehicles request."
  - name: model
    type: string
    description: "Model value for this vehicles request."
  - name: plate_number
    type: string
    description: "Plate number value for this vehicles request."
  - name: status
    type: enum
    values: ["active", "inactive"]
    description: "Lifecycle status of the resource."
  - name: created_at
    type: timestamp
    description: "Time when the resource was created."
