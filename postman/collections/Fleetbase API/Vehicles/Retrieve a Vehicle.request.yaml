$kind: http-request
description: Retrieve details for a specific `Vehicle`.
url: "{{base_url}}/{{namespace}}/vehicles/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{vehicle_id}}"
    description: (Required) The id of the `Vehicle`.
examples: ./.resources/Retrieve a Vehicle.resources/examples
order: 3000
