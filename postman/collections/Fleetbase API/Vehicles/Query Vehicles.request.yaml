$kind: http-request
description: |-
  Returns vehicles matching the supplied filters. Use pagination and query parameters to control the result set.
url: "{{base_url}}/{{namespace}}/vehicles"
method: GET
headers:
  Accept: application/json
examples: ./.resources/Query Vehicles.resources/examples
queryParams:
  query: "{{vehicle_name}}"
  limit: "25"
  offset: "0"
  sort: "created_at"
order: 2000
