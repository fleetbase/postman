$kind: http-request
description: This endpoint allows you to query vehicles you have created, it also provides paginated results on all the vehicles in your Fleetbase.
url: "{{base_url}}/{{namespace}}/vehicles"
method: GET
headers:
  Accept: application/json
examples: ./.resources/Query Vehicles.resources/examples
queryParams:
  query: "{{vehicle_name}}"
  limit: "25"
  offset: "0"
  sort: "created_at"
order: 2000
