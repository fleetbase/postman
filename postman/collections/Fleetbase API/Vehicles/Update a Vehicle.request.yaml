$kind: http-request
description: |-
  You can update the driver assigned, plate number, and status of the `Vehicle`.

  Vehicle's can only be assigned to one driver at a time, if a vehicle is re-assigned to another driver then the last driver will no longer be assigned to the vehicle.
url: "{{base_url}}/{{namespace}}/vehicles/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{vehicle_id}}"
    description: (Required) The id of the `Vehicle`.
body:
  type: json
  content: |
    {
        "speed": 90,
        "bearing": 22.5,
        "latitude": 40.7484,
        "longitude": -73.9857
    }
examples: ./.resources/Update a Vehicle.resources/examples
order: 4000
