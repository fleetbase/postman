$kind: http-request
description: |-
  Updates a vehicle's identity, operational status, vendor assignment, location, capacity, or orchestrator constraints. Updating the VIN refreshes decoded VIN data.
url: "{{base_url}}/{{namespace}}/vehicles/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{vehicle_id}}"
    description: (Required) The id of the `Vehicle`.
body:
  type: json
  content: |
    {
        "plate_number": "ABC123",
        "status": "operational",
        "latitude": 40.7484,
        "longitude": -73.9857,
        "speed": 90
    }
examples: ./.resources/Update a Vehicle.resources/examples
order: 4000
