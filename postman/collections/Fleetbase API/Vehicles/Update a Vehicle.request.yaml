$kind: http-request
description: |-
  Updates a vehicle. Parameters not supplied remain unchanged.
url: "{{base_url}}/{{namespace}}/vehicles/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{vehicle_id}}"
    description: (Required) The id of the `Vehicle`.
body:
  type: json
  content: |
    {
        "speed": 90,
        "bearing": 22.5,
        "latitude": 40.7484,
        "longitude": -73.9857
    }
examples: ./.resources/Update a Vehicle.resources/examples
order: 4000
