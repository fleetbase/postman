$kind: http-request
description: |-
  Creates a vehicle for the current company. Send VIN, make/model fields, assignment fields, status, location, capacity, or orchestrator constraints as needed.
url: "{{base_url}}/{{namespace}}/vehicles"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |
    {
      "vin": "1GCGSBEA0G1111111",
      "year": 2023,
      "make": "Toyota",
      "model": "Camry",
      "trim": "SE",
      "plate_number": "ABC123",
      "status": "maintenance",
      "online": false
    }
scripts:
  - type: afterResponse
    code: |
      var json_response = pm.response.json();
      let cv = pm.environment;
      cv.set("vehicle_id", json_response.id);
      cv.set("vehicle_name", json_response.make);
    language: text/javascript
examples: ./.resources/Create a Vehicle.resources/examples
order: 1000
