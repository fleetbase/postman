$kind: params
fields:
  - name: query
    type: string
    description: Search term matched against vehicle fields.
  - name: limit
    type: integer
    description: Maximum number of vehicles to return.
  - name: offset
    type: integer
    description: Number of vehicles to skip before returning results.
  - name: sort
    type: string
    description: Sort expression for the vehicle query.
  - name: vendor
    type: string
    description: Vendor ID used to filter vehicles assigned to a vendor.
