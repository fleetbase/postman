$kind: object
name: Part
description: |-
  A part stores stock quantity, cost, supplier, warranty, asset association, and inventory status data.
example: |
  {
    "id": "part_8KqM3KpL2n",
    "sku": "FLT-OIL-001",
    "name": "Oil Filter",
    "quantity_on_hand": 24,
    "unit_cost": 1200,
    "currency": "USD",
    "status": "in_stock",
    "is_in_stock": true,
    "meta": {},
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public part identifier.
  - name: sku
    type: string
    description: Part SKU.
  - name: name
    type: string
    description: Part name.
  - name: quantity_on_hand
    type: integer
    description: Current stock quantity.
  - name: unit_cost
    type: currency
    description: Unit cost.
  - name: msrp
    type: currency
    description: Suggested retail price.
  - name: vendor
    type: string
    description: Vendor public ID, when loaded.
  - name: asset
    type: string
    description: Associated asset public ID, when loaded.
  - name: is_in_stock
    type: boolean
    description: Whether quantity is above zero.
  - name: meta
    type: object
    description: Additional part metadata.
