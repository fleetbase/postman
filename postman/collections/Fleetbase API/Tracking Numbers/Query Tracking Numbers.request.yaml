$kind: http-request
description: This endpoint allows you to query tracking-numbers you have created, it also provides paginated results on all the tracking-numbers in your Fleetbase.
url: "{{base_url}}/{{namespace}}/tracking-numbers"
method: GET
headers:
  Accept: application/json
examples: ./.resources/Query Tracking Numbers.resources/examples
queryParams:
  query: "SG"
  limit: "25"
  offset: "0"
  sort: "created_at"
order: 3000
