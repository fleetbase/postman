$kind: http-request
description: |-
  Returns tracking numbers matching the supplied filters. Use pagination and query parameters to control the result set.
url: "{{base_url}}/{{namespace}}/tracking-numbers"
method: GET
headers:
  Accept: application/json
examples: ./.resources/Query Tracking Numbers.resources/examples
queryParams:
  query: "SG"
  limit: "25"
  offset: "0"
  sort: "created_at"
order: 3000
