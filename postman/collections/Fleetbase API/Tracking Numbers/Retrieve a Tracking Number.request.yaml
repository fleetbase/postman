$kind: http-request
description: |-
  Retrieves a tracking number. The response includes the current API representation of the resource.
url: "{{base_url}}/{{namespace}}/tracking-numbers/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{tracking_number_id}}"
    description: (Required) The id of the tracking number.
examples: ./.resources/Retrieve a Tracking Number.resources/examples
order: 2000
