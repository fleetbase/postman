$kind: params
fields:
  - name: region
    type: string
    required: true
    description: Region code used when generating the tracking number.
  - name: owner
    type: string
    required: true
    description: Order or entity ID that owns the tracking number.
  - name: type
    type: enum
    values: ["city", "province", "country"]
    description: Region granularity used when generating the tracking number.
  - name: status
    type: enum
    values: ["active", "inactive"]
    description: Initial tracking number status.
