$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/tracking-numbers/from-qr"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "code": "{{qr_code}}"
      }
  
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "tracking-number_abc123",
        "object": "tracking-number",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
