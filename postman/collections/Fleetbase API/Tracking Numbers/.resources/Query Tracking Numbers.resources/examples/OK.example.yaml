$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/tracking-numbers?query=<string>&status=<string>&limit=<string>&offset=<string>&sort=<string>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: query
      value: <string>
      description: This parameter allows you to filter the results by their name.
    - key: status
      value: <string>
      description: Filter the tracking-numbers by their status.
    - key: limit
      value: <string>
      description: A cursor for use in pagination. A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 10.
    - key: offset
      value: <string>
      description: A cursor for use in pagination. A offset for the results, when the offset is supplied the results will start from the offset.
    - key: sort
      value: <string>
      description: You can order the results by any property of the Tracking Number object.
