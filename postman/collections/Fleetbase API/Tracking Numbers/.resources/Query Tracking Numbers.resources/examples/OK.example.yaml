      {
        "id": "<string>",
        "name": "<string>",
        "type": "<string>",
        "latitude": "<string>",
        "longitude": "<string>",
        "status": "<string>",
        "updated_at": "<string>",
        "created_at": "<string>"
      }
order: 1000
