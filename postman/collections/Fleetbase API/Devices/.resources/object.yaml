$kind: object
name: Device
description: |-
  A device stores hardware identity, provider data, attachment state, telemetry status, and latest connectivity information.
example: |
  {
    "id": "device_7YqM3KpL2n",
    "name": "OBD Tracker 12",
    "type": "obd",
    "device_id": "OBD-12",
    "serial_number": "SN-10001",
    "status": "active",
    "connection_status": "online",
    "attached_to_name": "ABC123",
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public device identifier.
  - name: name
    type: string
    description: Device name.
  - name: type
    type: string
    description: Device type.
  - name: device_id
    type: string
    description: Provider or hardware device identifier.
  - name: serial_number
    type: string
    description: Device serial number.
  - name: telematic
    type: string
    description: Telematic public ID, when loaded.
  - name: attachable
    type: string
    description: Attached resource public ID, when loaded.
  - name: status
    type: string
    description: Device status.
  - name: connection_status
    type: string
    description: Derived connection status.
  - name: meta
    type: object
    description: Additional device metadata.
