$kind: http-request
description: |-
  Deletes a payloads resource. The response confirms the resource that was removed.
url: "{{base_url}}/{{namespace}}/payloads/:id"
method: DELETE
pathVariables:
  - key: id
    value: "{{payload_id}}"
    description: (Required) The id of the `Payload`.
examples: ./.resources/Delete a Payload.resources/examples
order: 4000
