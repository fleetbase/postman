request:
  url: "{{base_url}}/{{namespace}}/payloads?pickup={{place_id}}&dropoff={{place_id}}&type=delivery"
  method: POST
  queryParams:
    - key: pickup
      value: "{{place_id}}"
      description: (Required) The id of the Place object where the payload should be picked up.
    - key: dropoff
      value: "{{place_id}}"
      description: (Required) The id of the Place object where the payload should be dropped off.
    - key: type
      value: delivery
      description: The type of payload. This is typically aligned with the service type such as "passenger", "parcel", or "task". This should match the service rate type if payload must be delivered through PurchaseRate creation.
    - key: return
      value: ""
      disabled: true
      description: The id of the Place object where the payload should be returned to if the drop off cannot be completed.
    - key: customer
      value: ""
      disabled: true
      description: The id of the Vendor or Contact object the payload is for.
    - key: meta
      value: ""
      disabled: true
      description: Set of key-value pairs that you can attach to an object. This can be useful for storing additional information about the object in a structured format.
