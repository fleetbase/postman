$kind: http-request
description: |-
  Creates a payload containing route endpoints and optional entities. Provide either pickup/dropoff endpoints or a waypoint list, then attach entities as needed.
url: "{{base_url}}/{{namespace}}/payloads"
method: POST
body:
  type: json
  content: |-
    {
      "pickup": "10 Bayfront Avenue, Singapore 018956",
      "dropoff": "80 Mandai Lake Rd, Singapore 729826",
      "type": "food_delivery"
    }
scripts:
  - type: afterResponse
    code: |
      var json_response = pm.response.json();
      let cv = pm.environment;
      cv.set("payload_id", json_response.id);
    language: text/javascript
examples: ./.resources/Create a Payload.resources/examples
order: 1000
