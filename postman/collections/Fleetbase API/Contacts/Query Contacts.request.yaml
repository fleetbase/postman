$kind: http-request
description: |-
  Returns contacts matching the supplied filters. Use pagination and query parameters to control the result set.
url: "{{base_url}}/{{namespace}}/contacts"
method: GET
headers:
  Accept: application/json
examples: ./.resources/Query Contacts.resources/examples
queryParams:
  query: "{{contact_name}}"
  limit: "25"
  offset: "0"
  sort: "created_at"
order: 2000
