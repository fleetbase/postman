$kind: http-request
description: |-
  Updates a contact. Parameters not supplied remain unchanged.
url: "{{base_url}}/{{namespace}}/contacts/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{contact_id}}"
    description: (Required) The id of the contact.
body:
  type: json
  content: |-
    {
        "name": "John Doe",
        "title": "Mr",
        "email": "john@exampleco.com",
        "phone": "563-920-4264",
        "type": "technician",
        "slug": "john-doe"
    }
examples: ./.resources/Update a Contact.resources/examples
order: 4000
