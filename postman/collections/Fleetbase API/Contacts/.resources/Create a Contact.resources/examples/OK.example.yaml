$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/contacts?name=<string>&type=<string>&title=<string>&email=<string>&phone=<string>"
  method: POST
  headers:
    Accept: application/json
  queryParams:
    - key: name
      value: <string>
      description: (Required) The name of the contact.
    - key: type
      value: <string>
      description: '(Required) The type of contact, for example: "customer", "assosciate", "technician"'
    - key: title
      value: <string>
      description: "The title or salutation of the contact. For example: Cheif Technology Officer, Mr"
    - key: email
      value: <string>
      description: The email of the contact.
    - key: phone
      value: <string>
      description: The phone number of the contact.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "<string>",
        "name": "<string>",
        "title": "<string>",
        "email": "<string>",
        "phone_number": "<string>",
        "phone_country_code": "<string>",
        "type": "<string>",
        "slug": "<string>",
        "updated_at": "<string>",
        "created_at": "<string>"
      }
order: 1000
