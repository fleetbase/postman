$kind: object
name: Work Order
description: |-
  A work order is an operational task wrapper used to assign and track maintenance or other fleet work.
example: |
  {
    "id": "work_order_6JpL9Qx2Vz",
    "code": "WO-AB12CD34",
    "subject": "Replace rear tire",
    "category": "corrective_maintenance",
    "status": "open",
    "priority": "high",
    "target_name": "ABC123",
    "assignee_name": "Acme Parts",
    "completion_percentage": 0,
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public work order identifier.
  - name: code
    type: string
    description: Work order code.
  - name: subject
    type: string
    description: Work order subject.
  - name: category
    type: string
    description: Work order category.
  - name: status
    type: string
    description: Work order status.
  - name: priority
    type: string
    description: Work order priority.
  - name: target
    type: object
    description: Target resource, when loaded.
  - name: assignee
    type: object
    description: Assigned vendor or contact, when loaded.
  - name: checklist
    type: array
    description: Checklist items.
  - name: meta
    type: object
    description: Additional work order metadata.
