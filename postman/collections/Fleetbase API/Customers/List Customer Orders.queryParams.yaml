$kind: params
fields:
  - name: limit
    type: integer
    required: false
    description: Page size.
  - name: offset
    type: integer
    required: false
    description: Page offset.
  - name: status
    type: string
    required: false
    description: Filter by order status (e.g. `created`, `dispatched`, `completed`).
  - name: query
    type: string
    required: false
    description: Free-text search across order fields.
