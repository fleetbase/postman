$kind: http-request
name: "Request Customer Creation Code"
description: "Sends an email or SMS verification code to start a customer signup. Required before calling `Create a Customer`."
url: "{{base_url}}/{{namespace}}/customers/request-creation-code"
method: POST
body:
  type: json
  content: |-
    {
      "identity": "{{customer_identity}}",
      "mode": "email"
    }

order: 1000
