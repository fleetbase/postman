$kind: http-request
name: "Reset Customer Password"
description: "Verifies the reset code from `Forgot Customer Password` and sets a new password. All existing tokens for the customer's user are revoked on success."
url: "{{base_url}}/{{namespace}}/customers/reset-password"
method: POST
body:
  type: json
  content: |-
    {
      "identity": "{{customer_identity}}",
      "code": "{{verification_code}}",
      "password": "{{customer_password}}"
    }

order: 7000
