$kind: params
fields:
  - name: identity
    type: string
    required: true
    description: Customer email address or phone number to send the verification code to.
  - name: mode
    type: string
    required: true
    description: Channel to send the code through. One of `email` or `sms`.
  - name: name
    type: string
    required: false
    description: Customer display name. When supplied, the verification email greets the customer by name and the pending user record is seeded with this value (avoids a "Pending Customer" placeholder).
  - name: phone
    type: string
    required: false
    description: Phone number (E.164 recommended). Pre-seeded on the pending user record alongside the email identity.
