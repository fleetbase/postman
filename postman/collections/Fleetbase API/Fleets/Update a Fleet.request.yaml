$kind: http-request
description: |-
  Updates a fleet's name or assigned service area.
url: "{{base_url}}/{{namespace}}/fleets/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  id: "{{fleet_id}}"
body:
  type: json
  content: |-
    {
        "name": "Haulers",
        "service_area": "{{service_area_id}}"
    }
examples: ./.resources/Update a Fleet.resources/examples
order: 4000
