$kind: params
fields:
  - name: limit
    type: integer
    description: Maximum number of fleets to return.
  - name: offset
    type: integer
    description: Number of fleets to skip before returning results.
  - name: sort
    type: string
    description: Sort expression for the fleet query.
  - name: with
    type: array of strings
    description: Relationships to include in fleet responses.
