$kind: http-request
description: |-
  Creates a fleet for grouping drivers and vehicles. Assign a service area when the fleet should be constrained to a specific operating area.
url: "{{base_url}}/{{namespace}}/fleets"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "name": "Haulers",
        "service_area": "{{service_area_id}}"
    }
scripts:
  - type: afterResponse
    code: |-
      var json_response = pm.response.json();
      let cv = pm.environment;

      cv.set("fleet_id", json_response.id);
      cv.set("fleet_name", json_response.name);
    language: text/javascript
examples: ./.resources/Create a Fleet.resources/examples
order: 1000
