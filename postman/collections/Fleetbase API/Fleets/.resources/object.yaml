$kind: object
name: Fleet
description: |-
  A fleet groups drivers and vehicles for operational assignment. Fleets can be linked to service areas, zones, vendors, parent fleets, subfleets, drivers, and vehicles.
example: |
  {
    "id": "fleet_4Mnp8Qx2Vz",
    "name": "Haulers",
    "task": null,
    "status": "active",
    "service_area": null,
    "zone": null,
    "vendor": null,
    "parent_fleet": null,
    "subfleets": [],
    "drivers": [],
    "vehicles": [],
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public fleet identifier.
  - name: name
    type: string
    description: Fleet display name.
  - name: task
    type: string
    description: Task associated with the fleet.
  - name: status
    type: string
    description: Fleet status.
  - name: service_area
    type: object
    description: Service area assigned to the fleet, when loaded.
  - name: zone
    type: object
    description: Zone assigned to the fleet, when loaded.
  - name: vendor
    type: object
    description: Vendor assigned to the fleet, when loaded.
  - name: parent_fleet
    type: object
    description: Parent fleet, when loaded.
  - name: subfleets
    type: array of objects
    description: Child fleets, when loaded.
  - name: drivers
    type: array of objects
    description: Drivers assigned to the fleet, when loaded.
  - name: vehicles
    type: array of objects
    description: Vehicles assigned to the fleet, when loaded.
  - name: updated_at
    type: timestamp
    description: Timestamp when the fleet was last updated.
  - name: created_at
    type: timestamp
    description: Timestamp when the fleet was created.
