$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/orchestrator/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "mode": "assign_vehicles",
        "order_ids": ["order_heavy_01", "order_cold_02", "order_parcel_03"],
        "vehicle_ids": ["vehicle_capacity_truck_01", "vehicle_cold_van_01"],
        "prior_assignments": [],
        "options": {
          "engine": "vroom",
          "allocation_strategy": "capacity_only",
          "vehicle_packing": "minimize_vehicles",
          "vehicle_fixed_cost": 100000,
          "respect_capacity": true,
          "respect_skills": true,
          "balance_workload": false
        }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "assignments": [
          {
            "order_id": "order_heavy_01",
            "vehicle_id": "vehicle_capacity_truck_01",
            "driver_id": null,
            "sequence": 1,
            "arrival": 0,
            "duration": 0,
            "distance": 0
          },
          {
            "order_id": "order_cold_02",
            "vehicle_id": "vehicle_capacity_truck_01",
            "driver_id": null,
            "sequence": 2,
            "arrival": 0,
            "duration": 0,
            "distance": 0
          }
        ],
        "unassigned": ["order_parcel_03"],
        "summary": {
          "engine": "vroom",
          "allocation_strategy": "capacity_only",
          "vehicle_packing": "minimize_vehicles",
          "vehicle_fixed_cost": 100000,
          "routes": 1,
          "unassigned": 1
        }
      }
order: 1100
