$kind: params
fields:
  - name: limit
    type: integer
    required: false
    description: Page size.
  - name: offset
    type: integer
    required: false
    description: Page offset.
  - name: key
    type: string
    required: false
    description: Filter by short key (e.g. `transport`).
  - name: query
    type: string
    required: false
    description: Free-text search across config fields.
