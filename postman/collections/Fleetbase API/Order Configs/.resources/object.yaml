fields:
  - name: id
    type: string
    description: Public order-config identifier. Prefixed `order_config_`.
  - name: key
    type: string
    description: Short identifier (e.g. `transport`). Stable across companies for system configs.
  - name: name
    type: string
    description: Human-readable name.
  - name: namespace
    type: string
    description: Fully-qualified identifier (e.g. `system:order-config:transport`). Unique per company.
  - name: description
    type: string
    description: Free-form description.
  - name: tags
    type: array of strings
    description: Free-form tags.
  - name: status
    type: string
    description: Config lifecycle status. Newly created configs default to `private`; system configs may be `active`.
  - name: version
    type: string
    description: Semver-style schema version (e.g. `0.0.1`).
  - name: flow
    type: object
    description: |-
      The activity graph as an object keyed by activity code. Each value is an **Activity** object — a node in the order's state machine. Activities are linked via their own `activities` field (an array of child activity codes), forming a directed graph from `created` through to a terminal state (`complete: true`). The well-known canonical codes are `created`, `dispatched`, `started`, `enroute`, `completed`, and `canceled`.

      The map's key order reflects the order activities are declared in the underlying JSON — **not** graph progression. To walk the workflow, start from `flow.created` (or whichever activity has no inbound edges) and follow each activity's `activities` array. Treat each activity's `code` (and the map key) as the stable identifier; everything else is editable through the operator console.
    fields:
      - name: key
        type: string
        description: Canonical activity code. Mirrors the map key and the activity's `code`.
      - name: code
        type: string
        description: Canonical activity code (e.g. `created`, `dispatched`, `started`, `enroute`, `completed`, `canceled`). Treat this as the stable identifier when rendering UI.
      - name: status
        type: string
        description: Human-readable label for the activity (e.g. `Driver Enroute`).
      - name: details
        type: string
        description: Long-form description of what this activity represents.
      - name: color
        type: string
        description: Hex colour hint for status UI (e.g. `#1f2937`).
      - name: sequence
        type: integer
        description: Editor-managed ordering hint, used by the operator UI when laying out the graph.
      - name: complete
        type: boolean
        description: '`true` for terminal activities. The order is considered complete when it reaches an activity with `complete: true`. Multiple activities can be terminal (e.g. `completed`, `canceled`).'
      - name: activities
        type: array of strings
        description: Child activity codes — the activities reachable from this one. This is the graph edge list; an empty array marks a terminal (leaf) node.
      - name: pod_method
        type: string
        description: 'Proof-of-delivery method required at this activity. One of `scan`, `signature`, `photo`, or `null` when no POD is configured.'
      - name: require_pod
        type: boolean
        description: Whether proof-of-delivery must be captured before the order can advance past this activity.
      - name: logic
        type: array of objects
        description: |-
          Conditional logic gates evaluated before this activity is considered reachable. Each gate has:
            - `type` (string) — `and`, `or`, `not`, or `if`
            - `conditions` (array of objects) — each `{ field, operator, value }`, where `operator` is one of `exists`, `in`/`has`, `notIn`/`doesntHave`, `contains`, `beginsWith`, `endsWith`, or a standard comparison (`=`, `!=`, `<`, `>`, `<=`, `>=`)
          The default transport config carries an empty `logic` array (no gating).
      - name: events
        type: array of strings
        description: Event names fired when this activity is entered (e.g. notification or webhook hooks). The default transport config carries an empty `events` array.
      - name: actions
        type: array of objects
        description: Actions wired to this activity (reserved for editor-managed handlers). The default transport config carries an empty `actions` array.
      - name: options
        type: array of objects
        description: Activity options exposed by the operator UI. The default transport config carries an empty `options` array.
      - name: entities
        type: array of objects
        description: Entities (parcels, packages, line items) attached specifically to this activity. Most configs carry entities at the OrderConfig level rather than per-activity, so this is typically `[]`.
      - name: internalId
        type: string
        description: UUID assigned by the order-config editor to identify this activity instance. Stable across edits and unrelated to the public `id`.
  - name: created_at
    type: timestamp
    description: When the config was created.
  - name: updated_at
    type: timestamp
    description: When the config was last updated.
