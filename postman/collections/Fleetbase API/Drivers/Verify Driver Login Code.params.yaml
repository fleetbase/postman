$kind: params
fields:
  - name: identity
    type: string
    required: true
    description: Driver email address or phone number used for verification.
  - name: code
    type: string
    required: true
    description: Verification code sent to the driver.
  - name: for
    type: string
    default: driver_login
    description: Verification purpose. Defaults to `driver_login`.
