$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/drivers/:id/track"
  method: PATCH
  headers:
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: text
    content: |-
      {
        "latitude": -19.288195,
        "longitude": 146.795965,
        "speed": 100
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "driver_abc123",
        "object": "driver",
        "name": "Alex Driver",
        "status": "active",
        "phone": "+15555550101",
        "online": false,
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
