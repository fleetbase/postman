$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/drivers/:id/simulate"
  method: POST
  headers:
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: json
    content: |-
      {
        "start": {
          "latitude": 1.3521,
          "longitude": 103.8198
        },
        "end": {
          "latitude": 1.2903,
          "longitude": 103.8519
        }
      }
  
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "driver_abc123",
        "object": "driver",
        "name": "Alex Driver",
        "status": "active",
        "phone": "+15555550101",
        "online": false,
        "created_at": "2026-05-07T12:00:00Z"
      }
order: 1000
