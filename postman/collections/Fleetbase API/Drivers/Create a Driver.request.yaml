$kind: http-request
description: |-
  Creates a driver. The response returns the created resource with its generated identifier.
url: "{{base_url}}/{{namespace}}/drivers"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |
    {
      "name": "John Doe",
      "email": "{{$randomEmail}}",
      "phone": "{{$randomPhoneNumber}}"
    }
scripts:
  - type: afterResponse
    code: |-
      var json_response = pm.response.json();
      let cv = pm.environment;

      cv.set("driver_id", json_response.id);
      cv.set("driver_name", json_response.name);
    language: text/javascript
examples: ./.resources/Create a Driver.resources/examples
order: 1000
