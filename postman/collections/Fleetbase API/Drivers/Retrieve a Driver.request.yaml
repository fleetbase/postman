$kind: http-request
description: This endpoint allows you to retrieve a driver object to view it's details.
url: "{{base_url}}/{{namespace}}/drivers/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{driver_id}}"
    description: (Required) The id of the `Driver`.
examples: ./.resources/Retrieve a Driver.resources/examples
order: 3000
