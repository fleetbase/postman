$kind: http-request
description: |-
  Retrieves a driver. The response includes the current API representation of the resource.
url: "{{base_url}}/{{namespace}}/drivers/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{driver_id}}"
    description: (Required) The id of the `Driver`.
examples: ./.resources/Retrieve a Driver.resources/examples
order: 3000
