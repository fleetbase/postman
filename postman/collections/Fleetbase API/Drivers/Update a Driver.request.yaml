$kind: http-request
description: You can update all properties of the Driver.
url: "{{base_url}}/{{namespace}}/drivers/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{driver_id}}"
    description: (Required) The id of the `Driver`.
body:
  type: json
  content: |
    {
      "name": "John Doe",
      "email": {{$randomEmail}},
      "phone": {{$randomPhoneNumber}}
    }
examples: ./.resources/Update a Driver.resources/examples
order: 4000
