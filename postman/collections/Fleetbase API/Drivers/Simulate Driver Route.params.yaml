$kind: params
fields:
  - name: start
    type: object
    description: Starting point for the simulated drive. Required when `order` is not supplied.
  - name: end
    type: object
    description: Ending point for the simulated drive. Required when `order` is not supplied.
  - name: order
    type: string
    description: Order ID to simulate. Required when the action is `order`.
  - name: action
    type: string
    default: drive
    description: Simulation action. Defaults to `drive`.
