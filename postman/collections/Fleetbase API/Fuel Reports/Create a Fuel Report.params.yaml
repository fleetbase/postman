$kind: params
fields:
  - name: driver
    type: string
    required: true
    description: Driver ID reporting the fuel purchase.
  - name: odometer
    type: number
    required: true
    description: Vehicle odometer reading at the time of the report.
  - name: volume
    type: number
    required: true
    description: Fuel volume purchased or reported.
  - name: metric_unit
    type: string
    description: Unit used for the fuel volume.
  - name: location
    type: object
    description: Location where the fuel was purchased or reported.
  - name: amount
    type: currency
    description: Monetary amount for the fuel purchase.
