$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/fuel-reports"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "driver": "{{driver_id}}",
        "odometer": 12042,
        "volume": 42.5,
        "metric_unit": "liter",
        "location": {
          "latitude": 1.3521,
          "longitude": 103.8198
        },
        "amount": 120.5,
        "currency": "USD",
        "status": "submitted"
      }
  
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "fuel-report_abc123",
        "object": "fuel-report",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
