$kind: object
name: Fuel Report
description: |-
  A fuel report records a driver's fuel purchase or fuel usage report with odometer, amount, volume, unit, location, vehicle, and status data.
example: |
  {
    "id": "fuel_report_4Mnp8Qx2Vz",
    "vehicle": null,
    "driver": null,
    "odometer": 10042,
    "amount": 6500,
    "currency": "USD",
    "volume": 42.5,
    "metric_unit": "liters",
    "type": null,
    "status": "created",
    "location": { "latitude": 1.3521, "longitude": 103.8198 },
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public fuel report identifier.
  - name: reporter
    type: object
    description: User who reported the fuel purchase, when loaded.
  - name: vehicle
    type: object
    description: Vehicle associated with the fuel report, when loaded.
  - name: driver
    type: object
    description: Driver associated with the fuel report, when loaded.
  - name: odometer
    type: number
    description: Odometer reading at the time of the report.
  - name: amount
    type: currency
    description: Monetary amount for the fuel purchase.
  - name: currency
    type: currency
    description: Three-letter currency code.
  - name: volume
    type: number
    description: Fuel volume.
  - name: metric_unit
    type: string
    description: Unit for the fuel volume.
  - name: type
    type: string
    description: Fuel report type.
  - name: status
    type: string
    description: Fuel report status.
  - name: location
    type: object
    description: Location where fuel was reported.
  - name: updated_at
    type: timestamp
    description: Timestamp when the fuel report was last updated.
  - name: created_at
    type: timestamp
    description: Timestamp when the fuel report was created.
