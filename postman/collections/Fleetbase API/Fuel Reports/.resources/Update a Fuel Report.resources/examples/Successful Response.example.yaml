$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/fuel-reports/:id"
  method: PUT
  headers:
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: json
    content: |-
      {
        "odometer": 12050,
        "volume": 43.1,
        "metric_unit": "liter",
        "amount": 122.75,
        "currency": "USD",
        "status": "approved"
      }
  
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
