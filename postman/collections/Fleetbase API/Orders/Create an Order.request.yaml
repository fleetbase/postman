$kind: http-request
description: |-
  To create a new `Order` in Fleetbase, the `Order` requires a payload which describres each `Entity` in the order as well as the geolocational waypoints. The payload can be created previously or created by sending a `Payload` object embedded within the Order request.

  Orders can also be subcontracted to a facilitator which can be either a `Contact` or `Vendor`. Like facilitator, the Order can also be assigned a customer which can also be either a `Contact` or `Vendor`.

  To schedule an order upon creation use the `scheduled_at` parameter to send a date and time to schedule the order.

  To assign a driver to the order the send the id of the driver to assign using the `driver` parameter.
url: "{{base_url}}/{{namespace}}/orders"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |
    {
      "pickup": "Singapore 018971",
      "dropoff": "321 Orchard Rd, Singapore",
      "waypoints": [
          "10 Bayfront Avenue, Singapore 018956",
          "18 Marina Gardens Drive, Singapore 018953",
          "80 Mandai Lake Rd, Singapore 729826",
          "1 Beach Road, Singapore 189673"
      ],
      "dispatch": false,
      "driver": "{{driver_id}}",
      "facilitator": "{{vendor_id}}",
      "customer": "{{contact_id}}",
      "meta": {
          "Warehouse": "WAREHOUSE-123"
      },
      "notes": "Order notes"
    }
scripts:
  - type: afterResponse
    code: |-
      var json_response = pm.response.json();
      let cv = pm.environment;
      cv.set("order_id", json_response.id);

      if (Array.isArray(json_response.payload.waypoints)) {
          const randomWaypoint = getRandomElement(json_response.payload.waypoints);

          if (randomWaypoint) {
              cv.set('waypoint_id', randomWaypoint.id);
          }
      }

      function getRandomElement(arr) {
          if (arr.length === 0) {
              return undefined; // Return undefined if the array is empty
          }
          const randomIndex = Math.floor(Math.random() * arr.length);
          return arr[randomIndex];
      }
    language: text/javascript
examples: ./.resources/Create an Order.resources/examples
order: 1000
