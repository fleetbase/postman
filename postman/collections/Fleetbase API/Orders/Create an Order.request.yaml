$kind: http-request
description: |-
  Creates an orders resource. The response returns the created resource with its generated identifier.
url: "{{base_url}}/{{namespace}}/orders"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |
    {
      "pickup": "Singapore 018971",
      "dropoff": "321 Orchard Rd, Singapore",
      "waypoints": [
          "10 Bayfront Avenue, Singapore 018956",
          "18 Marina Gardens Drive, Singapore 018953",
          "80 Mandai Lake Rd, Singapore 729826",
          "1 Beach Road, Singapore 189673"
      ],
      "dispatch": false,
      "driver": "{{driver_id}}",
      "facilitator": "{{vendor_id}}",
      "customer": "{{contact_id}}",
      "meta": {
          "Warehouse": "WAREHOUSE-123"
      },
      "notes": "Order notes"
    }
scripts:
  - type: afterResponse
    code: |-
      var json_response = pm.response.json();
      let cv = pm.environment;
      cv.set("order_id", json_response.id);

      if (Array.isArray(json_response.payload.waypoints)) {
          const randomWaypoint = getRandomElement(json_response.payload.waypoints);

          if (randomWaypoint) {
              cv.set('waypoint_id', randomWaypoint.id);
          }
      }

      function getRandomElement(arr) {
          if (arr.length === 0) {
              return undefined; // Return undefined if the array is empty
          }
          const randomIndex = Math.floor(Math.random() * arr.length);
          return arr[randomIndex];
      }
    language: text/javascript
examples: ./.resources/Create an Order.resources/examples
order: 1000
