$kind: http-request
description: Cancels an order without deleting the order resource.
url: "{{base_url}}/{{namespace}}/orders/:id/cancel"
method: DELETE
pathVariables:
  - key: id
    value: "{{order_id}}"
    description: (Required) The id of the `Order`.
examples: .resources/Cancel an Order.resources/examples
order: 13000
