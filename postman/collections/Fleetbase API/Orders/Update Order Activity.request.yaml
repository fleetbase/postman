$kind: http-request
description: Dispatches order to Driver.
url: "{{base_url}}/{{namespace}}/orders/:id/update-activity"
method: POST
pathVariables:
  - key: id
    value: "{{order_id}}"
    description: (Required) The id of the order to dispatch.
body:
  type: json
  content: |-
    {
        "skip_dispatch": false
    }
examples: ./.resources/Update Order Activity.resources/examples
order: 6000
