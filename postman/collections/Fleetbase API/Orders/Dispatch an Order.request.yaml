$kind: http-request
description: |-
  Dispatches an order to an assigned or eligible driver. The response returns the order after dispatch state has been applied.
url: "{{base_url}}/{{namespace}}/orders/:id/dispatch"
method: PATCH
pathVariables:
  - key: id
    value: "{{order_id}}"
    description: (Required) The id of the order to dispatch.
examples: ./.resources/Dispatch an Order.resources/examples
order: 4000
