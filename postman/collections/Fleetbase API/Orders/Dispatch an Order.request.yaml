$kind: http-request
description: |-
  Dispatch an Order for orders. The response returns the result of the operation.
url: "{{base_url}}/{{namespace}}/orders/:id/dispatch"
method: PATCH
pathVariables:
  - key: id
    value: "{{order_id}}"
    description: (Required) The id of the order to dispatch.
examples: ./.resources/Dispatch an Order.resources/examples
order: 4000
