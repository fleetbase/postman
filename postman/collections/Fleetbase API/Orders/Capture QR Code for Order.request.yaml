$kind: http-request
description: Dispatches order to Driver.
url: "{{base_url}}/{{namespace}}/orders/:id/capture-qr/:subject-id"
method: POST
pathVariables:
  - key: id
    value: "{{order_id}}"
    description: (Required) The id of the order to dispatch.
  - key: subject-id
    value: ""
    description: (Optional) Subject for signature, which can be a place, waypoint, or entity
body:
  type: json
  content: |-
    {
        "code": "",
        "data": [],
        "raw_data": []
    }
examples: ./.resources/Capture QR Code for Order.resources/examples
order: 10000
