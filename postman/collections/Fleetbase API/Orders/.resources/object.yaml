$kind: object
name: Order
description: |-
  An order represents a order record managed through the Fleetbase API. It includes a stable identifier, lifecycle state, timestamps, and the resource-specific attributes returned by the API.
example: |-
  {
    "id": "order_abc123",
    "object": "order",
    "status": "created",
    "pickup": {
      "id": "place_pickup",
      "name": "Warehouse"
    },
    "dropoff": {
      "id": "place_dropoff",
      "name": "Customer address"
    },
    "created_at": "2026-05-07T12:00:00Z"
  }
fields:
  - name: id
    type: string
    description: "Unique identifier for the resource."
  - name: object
    type: string
    description: "Object type returned by the API."
  - name: status
    type: enum
    values: ["active", "inactive"]
    description: "Lifecycle status of the resource."
  - name: pickup
    type: object
    description: "Pickup location, place ID, or embedded pickup details."
    fields:
      - name: id
        type: string
        description: "Unique identifier for the resource."
      - name: name
        type: string
        description: "Display name for the resource."
  - name: dropoff
    type: object
    description: "Dropoff location, place ID, or embedded dropoff details."
    fields:
      - name: id
        type: string
        description: "Unique identifier for the resource."
      - name: name
        type: string
        description: "Display name for the resource."
  - name: created_at
    type: timestamp
    description: "Time when the resource was created."
