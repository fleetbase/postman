$kind: http-request
description: |-
  Set Order Destination for orders. The response returns the result of the operation.
url: "{{base_url}}/{{namespace}}/orders/:id/set-destination/:placeId"
method: PATCH
pathVariables:
  - key: id
    value: "{{order_id}}"
    description: (Required) The id of the order to dispatch.
  - key: placeId
    value: "{{place_id}}"
body:
  type: json
  content: ""
examples: ./.resources/Set Order Destination.resources/examples
order: 8000
