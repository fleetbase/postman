$kind: params
fields:
  - name: query
    type: string
    description: Search query for fuel transactions.
  - name: limit
    type: integer
    description: Maximum number of records to return.
  - name: page
    type: integer
    description: Page number for paginated results.
  - name: sort
    type: string
    description: Sort expression, such as `-created_at`.
  - name: provider
    type: string
    description: Filter by provider.
  - name: sync_status
    type: string
    description: Filter by sync status.
  - name: vehicle
    type: string
    description: Filter by vehicle public ID.
  - name: connection
    type: string
    description: Filter by connection public ID.
  - name: transaction_at
    type: timestamp
    description: Filter by transaction date or range.
