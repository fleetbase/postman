$kind: http-request
description: |-
  Retrieves a single zone by ID. The response includes the zone geometry, display styling, and service area relationship.
url: "{{base_url}}/{{namespace}}/zones/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{zone_id}}"
    description: (Required) The id of the zone you want to delete.
examples: ./.resources/Retrieve a zone.resources/examples
order: 2000
