$kind: http-request
description: |-
  Returns zones matching the supplied filters. Use this to find configured geofences by name or other query parameters.
url: "{{base_url}}/{{namespace}}/zones"
method: GET
headers:
  Accept: application/json
examples: ./.resources/Query Zones.resources/examples
queryParams:
  name: "{{zone_name}}"
order: 3000
