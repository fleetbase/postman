description: |-
  Updates a zone. Parameters not supplied remain unchanged.
url: "{{base_url}}/{{namespace}}/zones/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  id: "{{zone_id}}"
body:
  type: json
  content: |-
    {
        "color": "#ff00000"
    }
examples: ./.resources/Update a Zone.resources/examples
order: 4000
