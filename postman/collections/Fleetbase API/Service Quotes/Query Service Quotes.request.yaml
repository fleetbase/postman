$kind: http-request
description: |-
  Returns service quotes matching the supplied filters. Use pagination and query parameters to control the result set.
url: "{{base_url}}/{{namespace}}/service-quotes"
method: GET
headers:
  Accept: application/json
queryParams:
  payload: "{{payload_id}}"
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: |
      var json_response = pm.response.json();
      let cv = pm.environment;

      if (Array.isArray(json_response) && json_response.length) {
          let serviceQuote = json_response[0];

          if (serviceQuote) {
              cv.set('service_quote_id', serviceQuote.id);
          }
      }
    language: text/javascript
examples: ./.resources/Query Service Quotes.resources/examples
order: 1000
