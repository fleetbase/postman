$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/service-quotes?payload=<string>&service_type=<string>&pickup=<string>&dropoff=<string>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: payload
      value: <string>
      description: The id of a Payload object, the payload type should match the service_type of the rates being retrieved. When the payload is supplied the other parameters are not required.
    - key: service_type
      value: <string>
      description: The service_type to calculate the rates for. This required field is defined in all ServiceRate objects. Required when payload is not supplied.
    - key: pickup
      value: <string>
      description: The pickup location for the order. The pickup can either be the id of a Place object, or latitude and longitude coordinates.  Acceptable coordinate formats can either be comma seperated latitude and longitude. Example latitude,longitude  Coordinates can also be supplied in an array format. Example pickup[latitude]=latitude pickup[longitude]=longitude Required when payload is not supplied.
    - key: dropoff
      value: <string>
      description: The dropoff location for the order. The dropoff can either be the id of a Place object, or latitude and longitude coordinates.  Acceptable coordinate formats can either be comma seperated latitude and longitude. Example latitude,longitude  Coordinates can also be supplied in an array format. Example pickup[latitude]=latitude pickup[longitude]=longitude Required when payload is not supplied.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "id": "<string>",
          "service_rate": "<string>",
          "request_id": "<string>",
          "amount": "<number>",
          "currency": "<string>",
          "created_at": "<string>",
          "updated_at": "<string>"
        }
      ]
order: 1000
