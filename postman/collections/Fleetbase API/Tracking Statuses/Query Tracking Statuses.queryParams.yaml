$kind: params
fields:
  - name: limit
    type: integer
    description: Maximum number of tracking statuses to return.
  - name: offset
    type: integer
    description: Number of tracking statuses to skip before returning results.
  - name: sort
    type: string
    description: Sort expression for the tracking status query.
  - name: tracking_number
    type: string
    description: Filters statuses by tracking number ID.
