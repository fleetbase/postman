$kind: http-request
description: |-
  Updates an existing tracking status. The response returns the tracking status with the new values applied.
url: "{{base_url}}/{{namespace}}/tracking-statuses/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  id: "{{tracking_status_id}}"
body:
  type: json
  content: |-
    {
        "country": "SG"
    }
examples: ./.resources/Update a Tracking Status.resources/examples
order: 2000
