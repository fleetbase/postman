$kind: http-request
description: |-
  Searches and filters places for the current organization. Use query and pagination parameters to find matching saved locations.
url: "{{base_url}}/{{namespace}}/places"
method: GET
headers:
  Accept: application/json
queryParams:
  query: "{{place_name}}"
  limit: "25"
  offset: "<string>"
  sort: "created_at"
order: 2000
