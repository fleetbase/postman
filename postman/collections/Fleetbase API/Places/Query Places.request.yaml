$kind: http-request
description: |-
  Returns places matching the supplied filters. Use pagination and query parameters to control the result set.
url: "{{base_url}}/{{namespace}}/places"
method: GET
headers:
  Accept: application/json
queryParams:
  query: "{{place_name}}"
  limit: "25"
  offset: "<string>"
  sort: "created_at"
order: 2000
