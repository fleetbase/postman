$kind: params
fields:
  - name: name
    type: string
    description: Display name for the place.
  - name: street1
    type: string
    description: Primary street address.
  - name: street2
    type: string
    description: Secondary street address.
  - name: city
    type: string
    description: City or locality for the address.
  - name: province
    type: string
    description: State, province, or region for the address.
  - name: postal_code
    type: string
    description: Postal or ZIP code for the address.
  - name: neighborhood
    type: string
    description: Neighborhood or local area for the address.
  - name: district
    type: string
    description: District or administrative subdivision for the address.
  - name: building
    type: string
    description: Building name, number, or additional address detail.
  - name: security_access_code
    type: string
    description: Access code or delivery instructions needed to enter the building.
  - name: country
    type: string
    description: Country code for the address.
  - name: phone
    type: string
    description: Phone number associated with the place.
  - name: location
    type: object
    description: Resolvable point used as the place location.
  - name: latitude
    type: number
    description: Decimal latitude. Required with `longitude`.
  - name: longitude
    type: number
    description: Decimal longitude. Required with `latitude`.
  - name: owner
    type: string
    description: Contact or vendor ID that owns the place.
  - name: vendor
    type: string
    description: Vendor ID to assign as the place owner.
  - name: type
    type: string
    description: Place classification.
  - name: meta
    type: object
    description: Additional place metadata.
