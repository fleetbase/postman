$kind: http-request
description: |-
  Returns a paginated list of places for the current organization. Places are sorted by creation date unless another sort order is provided.
url: "{{base_url}}/{{namespace}}/places"
method: GET
headers:
  Accept: application/json
queryParams:
  limit: "25"
  offset: "0"
  sort: "created_at"
order: 3000
