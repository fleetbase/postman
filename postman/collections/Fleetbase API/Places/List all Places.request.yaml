$kind: http-request
description: |-
  Returns a paginated list of places for the current organization. Places are sorted by creation date unless another sort order is provided.
url: "{{base_url}}/{{namespace}}/places?limit=25&offset=0&sort=created_at"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: limit
    value: "25"
    description: A cursor for use in pagination. A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 10.
  - key: offset
    value: "0"
    description: A cursor for use in pagination. A offset for the results, when the offset is supplied the results will start from the offset.
  - key: sort
    value: created_at
    description: You can order the results by any property of the Place object.
order: 3000
