$kind: http-request
description: |-
  Retrieves a place. The response includes the current API representation of the resource.
url: "{{base_url}}/{{namespace}}/places/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{place_id}}"
    description: (Required) The id of the `Place`.
order: 4000
