$kind: http-request
description: This endpoint allows you to retrieve a place object to view it's details.
url: "{{base_url}}/{{namespace}}/places/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{place_id}}"
    description: (Required) The id of the `Place`.
order: 4000
