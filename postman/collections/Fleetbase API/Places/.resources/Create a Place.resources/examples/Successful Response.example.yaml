$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/places"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |
      {
        "name": "Central Park",
        "street1": "830 5th Ave",
        "city": "New York",
        "province": "New York",
        "postal_code": "10065",
        "neighborhood": "Manhattan",
        "district": "Midtown",
        "building": "Park Area",
        "country": "US",
        "phone_number": "212-310-6600",
        "phone_country_code": "+1",
        "type": "Park"
      }
