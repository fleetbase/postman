$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/places/:id"
  method: DELETE
  headers:
    Accept: application/json
  pathVariables:
    - key: id
      value: "{{place_id}}"
      description: (Required) The id of the `Place`.
response:
  statusCode: 200
  statusText: OK
  headers:
    Date: Wed, 27 Dec 2023 07:44:36 GMT
    Content-Type: application/json
    Transfer-Encoding: chunked
    Connection: keep-alive
    Server: nginx
    Cache-Control: no-cache, private
  body:
    type: json
    content: |-
      {
          "id": "place_n0voYdE",
          "object": "place",
          "time": "2023-12-27T07:44:36.000000Z",
          "deleted": true
      }
order: 1000
