$kind: object
name: Place
description: |-
  A place represents a place record managed through the Fleetbase API. It includes a stable identifier, lifecycle state, timestamps, and the resource-specific attributes returned by the API.
example: |-
  {
    "id": "place_abc123",
    "object": "place",
    "name": "Central Park",
    "latitude": 40.7829,
    "longitude": -73.9654,
    "city": "New York",
    "country": "US",
    "created_at": "2026-05-07T12:00:00Z"
  }
fields:
  - name: id
    type: string
    description: "Unique identifier for the resource."
  - name: object
    type: string
    description: "Object type returned by the API."
  - name: name
    type: string
    description: "Display name for the resource."
  - name: latitude
    type: number
    description: "Decimal latitude coordinate."
  - name: longitude
    type: number
    description: "Decimal longitude coordinate."
  - name: city
    type: string
    description: "City value for this places request."
  - name: country
    type: integer
    description: "Country value for this places request."
  - name: created_at
    type: timestamp
    description: "Time when the resource was created."
