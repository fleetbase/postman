$kind: params
fields:
  - name: query
    type: string
    required: true
    description: Free-form search text matched against place name and address fields.
  - name: ll
    type: string
    description: Latitude/longitude context used to rank or localize search results.
  - name: locale
    type: string
    description: Locale hint used for place search.
  - name: limit
    type: integer
    default: 10
    description: Maximum number of matching places to return.
  - name: geo
    type: boolean
    description: When true, enables geospatial search behavior.
  - name: latitude
    type: number
    description: Latitude context for geospatial search.
  - name: longitude
    type: number
    description: Longitude context for geospatial search.
