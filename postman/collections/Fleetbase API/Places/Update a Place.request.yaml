$kind: http-request
description: |-
  Updates a place by setting the fields included in the request. Send address fields, coordinates, owner assignment, type, phone, or metadata to change only those values.
url: "{{base_url}}/{{namespace}}/places/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{place_id}}"
    description: (Required) The id of the `Place`.
body:
  type: json
  content: |-
    {
        "name": "Central Park Edit",
        "street1": "830 5th Ave a ",
        "city": "New York",
        "province": "New York",
        "postal_code": "10065",
        "neighborhood": "Manhattan",
        "district": "Midtown",
        "building": "Park Area",
        "country": "US",
        "phone": "+12123106600",
        "type": "Park"
    }
examples: ./.resources/Update a Place.resources/examples
order: 5000
