$kind: params
fields:
  - name: query
    type: string
    description: Search term matched against place fields.
  - name: limit
    type: integer
    description: Maximum number of places to return.
  - name: offset
    type: integer
    description: Number of places to skip before returning results.
  - name: sort
    type: string
    description: Sort expression for the place query.
  - name: vendor
    type: string
    description: Vendor ID used to filter places owned by a vendor.
