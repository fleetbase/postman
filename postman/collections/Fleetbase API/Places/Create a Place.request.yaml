$kind: http-request
description: |-
  Creates a place for the current company. Provide structured address fields, a free-form `address` or `street1` value to geocode, or coordinates for Fleetbase to reverse geocode.
url: "{{base_url}}/{{namespace}}/places"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |
    {
      "name": "Central Park",
      "street1": "830 5th Ave",
      "city": "New York",
      "province": "New York",
      "postal_code": "10065",
      "neighborhood": "Manhattan",
      "district": "Midtown",
      "building": "Park Area",
      "country": "US",
      "phone": "+12123106600",
      "type": "Park"
    }
scripts:
  - type: afterResponse
    code: |-
      var json_response = pm.response.json();
      let cv = pm.environment;

      cv.set("place_id", json_response.id);
      cv.set("place_name", json_response.name);
    language: text/javascript
examples: ./.resources/Create a Place.resources/examples
order: 1000
