$kind: http-request
description: |-
  Creates a service areas resource. The response returns the created resource with its generated identifier.
url: "{{base_url}}/{{namespace}}/service-areas"
method: POST
body:
  type: json
  content: |-
    {
        "name": "Singapore",
        "type": "city",
        "latitude": "1.3521",
        "longitude": "103.8198",
        "radius": "30000",
        "country": "SG",
        "status": "active"
    }
scripts:
  - type: afterResponse
    code: |
      var json_response = pm.response.json();
      let cv = pm.environment;
      cv.set("service_area_id", json_response.id);
      cv.set("service_area_name", json_response.name);
    language: text/javascript
examples: ./.resources/Create a Service Area.resources/examples
order: 1000
