$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/service-areas"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
          "name": "Singapore",
          "type": "city",
          "latitude": "1.3521",
          "longitude": "103.8198",
          "radius": "30000",
          "country": "SG",
          "status": "active"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "service-area_abc123",
        "object": "service-area",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
