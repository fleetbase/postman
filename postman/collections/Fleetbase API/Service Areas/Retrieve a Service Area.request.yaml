$kind: http-request
description: |-
  Retrieves a service area. The response includes the current API representation of the resource.
url: "{{base_url}}/{{namespace}}/service-areas/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{service_area_id}}"
    description: (Required) The id of the service area you want to delete.
examples: ./.resources/Retrieve a Service Area.resources/examples
order: 2000
