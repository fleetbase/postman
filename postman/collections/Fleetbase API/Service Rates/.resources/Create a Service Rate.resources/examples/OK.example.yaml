$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/service-rates?service_name=<string>&service_type=<string>&rate_calculation_method=<string>&currency=<string>&base_fee=<string>&per_m_flat_rate_fee=<string>&meter_fees=<string>&algorithm=<string>&has_cod_fee=<string>&cod_calculation_method=<string>&cod_flat_fee=<string>&cod_percent=<string>&has_peak_hours_fee=<string>&peak_hours_calculation_method=<string>&peak_hours_flat_fee=<string>&peak_hours_percent=<string>&peak_hours_start=<string>&peak_hours_end=<string>&duration_terms=<string>&estimated_days=<string>"
  method: POST
  queryParams:
    - key: service_name
      value: <string>
      description: (Required) The name of the service rate to be created.
    - key: service_type
      value: <string>
      description: (Required) The type of service the rate being created is for.
    - key: rate_calculation_method
      value: <string>
      description: "(Required) The calculation method the Service Rate should use to calculate the rate total. Valid rate calculation methods:  per_km - this calculation method uses a fixed flat fee which is multiplied by the distance in kilometer. fixed_meter - this calculation method uses a specific flat rate defined for each distance in meters. algo - this method relies on an algorithm defined based on distance and time."
    - key: currency
      value: <string>
      description: (Required) The 3-letter ISO code currency the rate will use for calculations.
    - key: base_fee
      value: <string>
      description: Property that allows the rate to include a base or minimum fee to the start of the calculation. The value should be in cents, for example if the flat fee is $2.00 USD per kilometer, then the value should be "200".
    - key: per_m_flat_rate_fee
      value: <string>
      description: This property is required when the rate_calculation_method is set to "per_km". The flat rate should be the amount in cents, for example if the flat fee is $2.00 USD per kilometer, then the value should be "200". The same is true no matter the currency, for example if the flat fee is 1300 MNT (Mongolian Tugrik), then the value will be "1300".
    - key: meter_fees
      value: <string>
      description: This property is required when the rate_calculation_method is set to "fixed_meter". Supply a key value array consisting of the distance, and fee for the corresponding distance. Distances must increment in linear order.
    - key: algorithm
      value: <string>
      description: When the rate_calculation_method is set to algo, the algorithm must be supplied an mathematical algorithm which can be defined and used to calculate your rate using the variables {distance} and {time}. {distance} - is the distance between the pickup and dropoff in meters. {time} - is the estimated time between the pickup and dropoff in seconds.
    - key: has_cod_fee
      value: <string>
      description: Explicitly set property that determines if the rate should calculate a cash on delivery fee. Should be either "true" or "false". Defaults to false.
    - key: cod_calculation_method
      value: <string>
      description: 'The calculation method used for cash on delivery, required if has_cod_fee is set to true. Valid cash on delivery calculation methods: percentage - An additional line fee to the rate based on a percentage calculated from the rate total. flat - An additional flat fee for "cod" calculated into the rate total.'
    - key: cod_flat_fee
      value: <string>
      description: The flat cash on delivery fee amount, required when the cod_calculation_method is set to "flat".
    - key: cod_percent
      value: <string>
      description: The percentage to calculate from the service rate total for the cash on delivery fee, required when cod_calculation_method is set to "percentage".
    - key: has_peak_hours_fee
      value: <string>
      description: Explicitly set property that determines if the rate should calculate a peak hours fee. Should be either "true" or "false". Defaults to false.
    - key: peak_hours_calculation_method
      value: <string>
      description: 'The calculation method used for peak hours, required when has_peak_hours_fee is set to true. Valid peak hours calculation methods: percentage - An additional line fee to the rate based on a percentage calculated from the rate total. flat - An additional flat fee for "peak hours" calculated into the rate total.'
    - key: peak_hours_flat_fee
      value: <string>
      description: The flat peak hours fee amount, required when the peak_hours_calculation_method is set to "flat".
    - key: peak_hours_percent
      value: <string>
      description: The percentage to calculate from the service rate total for the peak hours fee, required when peak_hours_calculation_method is set to "percentage".
    - key: peak_hours_start
      value: <string>
      description: 'The 24 hour time format (HH:mm), required for peak hours. Ex: "16:30".'
    - key: peak_hours_end
      value: <string>
      description: 'The 24 hour time format (HH:mm), required for peak hours. Ex: "18:30"'
    - key: duration_terms
      value: <string>
      description: Additional terms or notices about the service rate.
    - key: estimated_days
      value: <string>
      description: The estimated number of days the service takes to complete, for same-day this will be 0. This will default to 0, if nothing is set.
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
