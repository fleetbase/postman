$kind: object
name: Service Rate
description: |-
  A service rate defines how Fleetbase prices a service within a service area or zone. It stores the calculation method, fee tiers, algorithm, COD and peak-hour surcharges, currency, and delivery estimates.
example: |
  {
    "id": "service_rate_8Qw2YxM3Nf",
    "order_config": "order_config_transport",
    "service_area": null,
    "zone": null,
    "service_name": "Standard Delivery",
    "service_type": "delivery",
    "base_fee": 500,
    "rate_calculation_method": "fixed_rate",
    "rate_fees": [],
    "parcel_fees": [],
    "currency": "USD",
    "duration_terms": "1-2 days",
    "estimated_days": 2,
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public service rate identifier.
  - name: order_config
    type: string
    description: Order configuration associated with the rate.
  - name: service_area
    type: object
    description: Service area associated with the rate.
  - name: zone
    type: object
    description: Zone associated with the rate.
  - name: service_name
    type: string
    description: Service rate display name.
  - name: service_type
    type: string
    description: Service type this rate applies to.
  - name: base_fee
    type: currency
    description: Base fee applied to the rate.
  - name: rate_calculation_method
    type: string
    description: Method used to calculate the rate.
  - name: rate_fees
    type: array of objects
    description: Distance or tiered fees.
  - name: parcel_fees
    type: array of objects
    description: Parcel-based fees.
  - name: algorithm
    type: string
    description: Computable algorithm for algorithmic rates.
  - name: currency
    type: currency
    description: Three-letter currency code.
  - name: duration_terms
    type: string
    description: Human-readable delivery duration terms.
  - name: estimated_days
    type: integer
    description: Estimated service duration in days.
  - name: updated_at
    type: timestamp
    description: Timestamp when the service rate was last updated.
  - name: created_at
    type: timestamp
    description: Timestamp when the service rate was created.
