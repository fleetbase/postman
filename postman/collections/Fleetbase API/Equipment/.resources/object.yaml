$kind: object
name: Equipment
description: |-
  An equipment record stores identity, assignment, warranty, purchase, and status details for reusable fleet equipment.
example: |
  {
    "id": "equipment_4Mnp8Qx2Vz",
    "name": "Liftgate LG-12",
    "code": "LG-12",
    "type": "liftgate",
    "status": "available",
    "serial_number": "LG120045",
    "manufacturer": "Maxon",
    "model": "BMR",
    "currency": "USD",
    "is_equipped": false,
    "meta": {},
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public equipment identifier.
  - name: name
    type: string
    description: Equipment name.
  - name: code
    type: string
    description: Internal equipment code.
  - name: type
    type: string
    description: Equipment type.
  - name: status
    type: string
    description: Equipment availability status.
  - name: serial_number
    type: string
    description: Equipment serial number.
  - name: manufacturer
    type: string
    description: Equipment manufacturer.
  - name: model
    type: string
    description: Equipment model.
  - name: equipable
    type: string
    description: Public ID of the assigned resource, when loaded.
  - name: meta
    type: object
    description: Additional equipment metadata.
