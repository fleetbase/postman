$kind: http-request
description: |-
  Creates an issues resource. The response returns the created resource with its generated identifier.
url: "{{base_url}}/{{namespace}}/issues"
method: POST
body:
  type: json
  content: |-
    {
      "driver": "{{driver_id}}",
      "location": {
        "latitude": 1.3521,
        "longitude": 103.8198
      },
      "report": "Vehicle tire pressure warning",
      "category": "vehicle",
      "type": "maintenance",
      "priority": "medium",
      "status": "open"
    }

order: 1000
