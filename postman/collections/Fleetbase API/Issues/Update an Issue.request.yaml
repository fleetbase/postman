$kind: http-request
description: |-
  Updates an issues resource. Parameters not supplied remain unchanged.
url: "{{base_url}}/{{namespace}}/issues/:id"
method: PUT
pathVariables:
  - key: id
    value: "{{issue_id}}"

body:
  type: json
  content: |-
    {
      "report": "Updated issue report",
      "category": "vehicle",
      "type": "maintenance",
      "priority": "high",
      "status": "resolved"
    }

order: 4000
