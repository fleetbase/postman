$kind: params
fields:
  - name: driver
    type: string
    required: true
    description: Driver ID reporting the issue.
  - name: location
    type: object
    required: true
    description: Location where the issue was reported.
  - name: report
    type: string
    required: true
    description: Issue report text submitted by the caller.
  - name: category
    type: string
    description: Category used to classify the issue.
  - name: type
    type: string
    description: Issue type.
  - name: priority
    type: string
    description: Priority level for the issue.
