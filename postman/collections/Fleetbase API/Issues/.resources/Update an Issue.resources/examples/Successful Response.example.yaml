$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/issues/:id"
  method: PUT
  headers:
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: json
    content: |-
      {
        "report": "Updated issue report",
        "category": "vehicle",
        "type": "maintenance",
        "priority": "high",
        "status": "resolved"
      }
  
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "issue_abc123",
        "object": "issue",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
