$kind: object
name: Issue
description: |-
  An issue records a driver- or vehicle-reported operational problem. It includes report text, priority, category, type, status, location, assignee, reporter, and resolution timestamps.
example: |
  {
    "id": "issue_8Qw2YxM3Nf",
    "driver_name": "Alex Driver",
    "vehicle_name": "ABC123",
    "issue_id": "ISS-1001",
    "title": null,
    "report": "Flat tire near the pickup location.",
    "priority": "high",
    "meta": {},
    "type": "vehicle",
    "category": "maintenance",
    "tags": [],
    "status": "open",
    "location": { "latitude": 1.3521, "longitude": 103.8198 },
    "resolved_at": null,
    "updated_at": "2026-05-07T08:30:00.000000Z",
    "created_at": "2026-05-07T08:30:00.000000Z"
  }
fields:
  - name: id
    type: string
    description: Public issue identifier.
  - name: assignee
    type: object
    description: User assigned to the issue, when loaded.
  - name: reporter
    type: object
    description: User who reported the issue, when loaded.
  - name: vehicle
    type: object
    description: Vehicle associated with the issue, when loaded.
  - name: driver
    type: object
    description: Driver associated with the issue, when loaded.
  - name: issue_id
    type: string
    description: Human-friendly issue identifier.
  - name: title
    type: string
    description: Issue title.
  - name: report
    type: string
    description: Issue report text.
  - name: priority
    type: string
    description: Issue priority.
  - name: meta
    type: object
    description: Additional issue metadata.
  - name: type
    type: string
    description: Issue type.
  - name: category
    type: string
    description: Issue category.
  - name: tags
    type: array of strings
    description: Tags associated with the issue.
  - name: status
    type: string
    description: Issue status.
  - name: location
    type: object
    description: Location where the issue was reported.
  - name: resolved_at
    type: timestamp
    description: Timestamp when the issue was resolved.
  - name: updated_at
    type: timestamp
    description: Timestamp when the issue was last updated.
  - name: created_at
    type: timestamp
    description: Timestamp when the issue was created.
