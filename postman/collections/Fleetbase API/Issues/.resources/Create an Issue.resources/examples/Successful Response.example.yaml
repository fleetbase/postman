$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/issues"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "driver": "{{driver_id}}",
        "location": {
          "latitude": 1.3521,
          "longitude": 103.8198
        },
        "report": "Vehicle tire pressure warning",
        "category": "vehicle",
        "type": "maintenance",
        "priority": "medium",
        "status": "open"
      }
  
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "issue_abc123",
        "object": "issue",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
