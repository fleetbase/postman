$kind: object
name: Geofence
description: |-
  A geofence represents a geofence record managed through the Fleetbase API. It includes a stable identifier, lifecycle state, timestamps, and the resource-specific attributes returned by the API.
example: |-
  {
    "id": "geofence_abc123",
    "object": "geofence",
    "status": "active",
    "created_at": "2026-05-07T12:00:00Z",
    "updated_at": "2026-05-07T12:00:00Z"
  }
fields:
  - name: id
    type: string
    description: "Unique identifier for the resource."
  - name: object
    type: string
    description: "Object type returned by the API."
  - name: status
    type: enum
    values: ["active", "inactive"]
    description: "Lifecycle status of the resource."
  - name: created_at
    type: timestamp
    description: "Time when the resource was created."
  - name: updated_at
    type: timestamp
    description: "Time when the resource was last updated."
