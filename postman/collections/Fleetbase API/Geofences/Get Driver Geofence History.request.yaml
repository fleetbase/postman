$kind: http-request
description: |-
  Retrieves a geofence. The response includes the current API representation of the resource.
url: "{{base_url}}/{{namespace}}/geofences/driver/:driverUuid/history"
method: GET

pathVariables:
  - key: driverUuid
    value: "{{driver_uuid}}"

queryParams:
  per_page: "50"
order: 4000
