$kind: http-request
description: |-
  Uploads a multipart file and creates a file record. The response includes the stored file URL and metadata captured from the upload.
url: "{{base_url}}/{{namespace}}/files"
method: POST
body:
  type: formdata
  content:
    - type: file
      key: file
      src: []
    - type: text
      key: path
      value: "uploads"
    - type: text
      key: type
      value: "attachment"

order: 1000
