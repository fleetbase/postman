$kind: http-request
description: |-
  Upload Base64 File for files. The response returns the result of the operation.
url: "{{base_url}}/{{namespace}}/files/base64"
method: POST
body:
  type: json
  content: |-
    {
      "data": "{{base64_file_data}}",
      "file_name": "example.png",
      "file_type": "image",
      "content_type": "image/png",
      "path": "uploads"
    }

order: 2000
