$kind: http-request
description: |-
  Updates a file record's caption, metadata, or original filename. The uploaded binary object is not replaced.
url: "{{base_url}}/{{namespace}}/files/:id"
method: PUT
pathVariables:
  - key: id
    value: "{{file_id}}"

body:
  type: json
  content: |-
    {
      "caption": "Updated caption",
      "meta": {}
    }

order: 3000
