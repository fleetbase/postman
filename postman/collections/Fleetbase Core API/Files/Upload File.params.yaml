$kind: params
fields:
  - name: file
    type: string
    required: true
    description: "Multipart file upload. The uploaded file may be up to 100 MB and must use one of the supported MIME types."
  - name: resize
    type: enum
    values: ["thumb", "sm", "md", "lg", "xl", "2xl"]
    description: "Optional image resize preset."
  - name: resize_width
    type: integer
    description: "Target resize width in pixels. Must be between 1 and 10000."
  - name: resize_height
    type: integer
    description: "Target resize height in pixels. Must be between 1 and 10000."
  - name: resize_mode
    type: enum
    values: ["fit", "crop", "stretch", "contain"]
    description: "Resize mode used when transforming the image."
  - name: resize_quality
    type: integer
    description: "Resize output quality from 1 to 100."
  - name: resize_format
    type: enum
    values: ["jpg", "jpeg", "png", "webp", "gif", "bmp", "avif"]
    description: "Output image format for the resized file."
  - name: resize_upscale
    type: boolean
    description: "Whether smaller images may be upscaled during resizing."
