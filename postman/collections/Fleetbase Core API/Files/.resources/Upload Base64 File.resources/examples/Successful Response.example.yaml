$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/files/base64"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "data": "{{base64_file_data}}",
        "file_name": "example.png",
        "file_type": "image",
        "content_type": "image/png",
        "path": "uploads"
      }
  
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "file_abc123",
        "object": "file",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
