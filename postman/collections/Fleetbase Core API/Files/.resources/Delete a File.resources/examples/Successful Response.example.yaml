$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/files/:id"
  method: DELETE
  headers:
    Accept: application/json
  pathVariables:
    id: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "file_abc123",
        "object": "file",
        "deleted": true
      }
order: 1000
