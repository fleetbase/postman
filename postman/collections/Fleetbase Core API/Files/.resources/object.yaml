$kind: object
name: File
description: |-
  A file represents an uploaded binary object and the metadata Fleetbase stores for it.
example: |
  {
    "id": "file_4WdX9o2",
    "url": "https://files.example.com/uploads/example.png",
    "original_filename": "example.png",
    "folder": "uploads",
    "content_type": "image/png",
    "file_size": 24576,
    "caption": "Proof of delivery",
    "type": "attachment",
    "meta": {},
    "updated_at": "2026-05-07T09:30:00Z",
    "created_at": "2026-05-07T09:30:00Z"
  }
fields:
  - name: id
    type: string
    description: "Public identifier of the file."
  - name: url
    type: string
    description: "Public URL for the stored file."
  - name: original_filename
    type: string
    description: "Original filename stored on the file record."
  - name: folder
    type: string
    description: "Storage folder containing the file."
  - name: content_type
    type: string
    description: "MIME content type of the file."
  - name: file_size
    type: integer
    description: "File size in bytes."
  - name: caption
    type: string
    description: "Caption displayed with the file."
  - name: type
    type: string
    description: "Logical file type stored on the file record."
  - name: meta
    type: object
    description: "Arbitrary metadata stored with the file."
  - name: updated_at
    type: timestamp
    description: "Time the file record was last updated."
  - name: created_at
    type: timestamp
    description: "Time the file record was created."
