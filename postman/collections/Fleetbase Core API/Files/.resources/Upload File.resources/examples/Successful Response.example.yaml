$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/files"
  method: POST
  headers:
    Accept: application/json
  body:
    type: formdata
    content:
      - type: file
        key: file
        src: []
      - type: text
        key: path
        value: "uploads"
      - type: text
        key: type
        value: "attachment"
  
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "file_abc123",
        "object": "file",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
