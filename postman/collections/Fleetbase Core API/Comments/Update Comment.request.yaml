$kind: http-request
description: |-
  Updates a comment. Parameters not supplied remain unchanged.
url: "{{base_url}}/{{namespace}}/comments/:id"
method: PUT
pathVariables:
  - key: id
    value: "{{comment_id}}"

body:
  type: json
  content: |-
    {
      "content": "Updated comment"
    }

order: 2000
