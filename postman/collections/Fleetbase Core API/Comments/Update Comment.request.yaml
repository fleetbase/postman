$kind: http-request
description: |-
  Updates the content of an existing comment. The subject and parent linkage are not changed by this endpoint.
url: "{{base_url}}/{{namespace}}/comments/:id"
method: PUT
pathVariables:
  - key: id
    value: "{{comment_id}}"

body:
  type: json
  content: |-
    {
      "content": "Updated comment"
    }

order: 2000
