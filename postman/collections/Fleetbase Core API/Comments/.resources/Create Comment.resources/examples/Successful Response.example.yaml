$kind: http-example
request:
  url: "{{base_url}}/{{namespace}}/comments"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "content": "Example comment",
        "subject": {
          "id": "{{subject_id}}",
          "type": "{{subject_type}}"
        }
      }
  
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "comment_abc123",
        "object": "comment",
        "status": "active",
        "created_at": "2026-05-07T12:00:00Z",
        "updated_at": "2026-05-07T12:00:00Z"
      }
order: 1000
