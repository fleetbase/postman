$kind: http-request
description: |-
  Creates a comment. The response returns the created resource with its generated identifier.
url: "{{base_url}}/{{namespace}}/comments"
method: POST
body:
  type: json
  content: |-
    {
      "content": "Example comment",
      "subject": {
        "id": "{{subject_id}}",
        "type": "{{subject_type}}"
      }
    }

order: 1000
