$kind: http-request
description: |-
  Creates a chat channels resource. The response returns the created resource with its generated identifier.
url: "{{base_url}}/{{namespace}}/chat-channels"
method: POST
body:
  type: json
  content: |-
    {
      "name": "Dispatch",
      "participants": [
        "{{user_id}}"
      ]
    }

order: 5000
