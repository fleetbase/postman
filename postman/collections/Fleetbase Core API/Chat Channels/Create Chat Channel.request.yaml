$kind: http-request
description: |-
  Creates a chat channel for the current organization. Include participant user IDs to add those users to the channel immediately after it is created.
url: "{{base_url}}/{{namespace}}/chat-channels"
method: POST
body:
  type: json
  content: |-
    {
      "name": "Dispatch",
      "participants": [
        "{{user_id}}"
      ]
    }

order: 5000
