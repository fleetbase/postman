$kind: http-request
description: |-
  Add Participant for chat channels. The response returns the result of the operation.
url: "{{base_url}}/{{namespace}}/chat-channels/:id/add-participant"
method: POST
pathVariables:
  - key: id
    value: "{{chat_channel_id}}"

body:
  type: json
  content: |-
    {
      "user": "{{user_id}}"
    }

order: 10000
