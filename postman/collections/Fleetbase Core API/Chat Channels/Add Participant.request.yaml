$kind: http-request
description: |-
  Adds a user in the current organization to an existing chat channel. The response returns the created chat participant resource.
url: "{{base_url}}/{{namespace}}/chat-channels/:id/add-participant"
method: POST
pathVariables:
  - key: id
    value: "{{chat_channel_id}}"

body:
  type: json
  content: |-
    {
      "user": "{{user_id}}"
    }

order: 10000
