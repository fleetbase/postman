$kind: http-request
description: |-
  Marks a chat message as read for a participant. If a receipt already exists for the message and participant, Fleetbase returns the existing receipt.
url: "{{base_url}}/{{namespace}}/chat-channels/read-message/:chatMessageId"
method: POST
pathVariables:
  - key: chatMessageId
    value: "{{chat_message_id}}"

body:
  type: json
  content: |-
    {
      "participant": "{{chat_participant_id}}"
    }

order: 4000
