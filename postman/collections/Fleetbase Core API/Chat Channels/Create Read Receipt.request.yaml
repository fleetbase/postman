$kind: http-request
description: |-
  Creates a chat channels resource. The response returns the created resource with its generated identifier.
url: "{{base_url}}/{{namespace}}/chat-channels/read-message/:chatMessageId"
method: POST
pathVariables:
  - key: chatMessageId
    value: "{{chat_message_id}}"

body:
  type: json
  content: |-
    {
      "participant": "{{chat_participant_id}}"
    }

order: 4000
