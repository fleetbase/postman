$kind: http-request
description: |-
  Deletes a chat message by ID. Use this when a previously sent message should be removed from the channel feed.
url: "{{base_url}}/{{namespace}}/chat-channels/delete-message/:chatMessageId"
method: DELETE
pathVariables:
  - key: chatMessageId
    value: "{{chat_message_id}}"

order: 3000
